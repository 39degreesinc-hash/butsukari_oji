<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ぶつかりおじさん回避ゲーム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- スタート画面 -->
  <div id="screen-start" class="screen active">
    <div class="screen-inner">
      <h1 class="title">ぶつかりおじさん<br>回避ゲーム</h1>
      <div class="ojisan-demo">🚶</div>
      <p class="description">
        上から降ってくる<strong>ぶつかりおじさん</strong>を<br>
        左右に動いて避け続けよう！<br><br>
        📱 左右タップで移動<br>
        💻 ← → キーで移動
      </p>
      <button id="btn-start" class="btn-primary">ゲームスタート</button>
    </div>
  </div>

  <!-- ゲーム画面 -->
  <div id="screen-game" class="screen">
    <div id="score-display">⏱ <span id="score">0</span>秒</div>
    <div id="game-area">
      <div id="player">🏃</div>
    </div>
    <div id="touch-left" class="touch-zone"></div>
    <div id="touch-right" class="touch-zone"></div>
  </div>

  <!-- ゲームオーバー画面 -->
  <div id="screen-gameover" class="screen">
    <div class="screen-inner">
      <h2 class="gameover-title">ゲームオーバー</h2>
      <div class="ojisan-demo">💥</div>
      <p class="final-score">スコア：<span id="final-score">0</span>秒</p>
      <p id="random-message" class="random-message"></p>
      <button id="btn-restart" class="btn-primary">もう一度</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
